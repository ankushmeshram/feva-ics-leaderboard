<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICS Security Benchmark Leaderboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- DataTables -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body>

<div class="container">

    <h1>ICS Security Benchmark Leaderboard</h1>

    <p>
        Benchmark results for ML-based IDS robustness evaluation
        under adversarial attacks.
    </p>

    <table id="leaderboard" class="display">
        <thead>
            <tr>
                <th>NIDS</th>
                <th>Model</th>
                <th>Dataset</th>
                <th>Clean Accuracy</th>
                <th>FGSM ASR</th>
                <th>PGD ASR</th>
                <th>CorrShift ASR</th>
                <th>Execution Time</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</div>
